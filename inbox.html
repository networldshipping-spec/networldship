<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - Net World Ship</title>
    <link rel="stylesheet" href="admin-styles.css">
    <style>
        .inbox-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            height: calc(100vh - 160px);
        }

        .conversations-list {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-y: auto;
            border: 1px solid #e5e7eb;
        }

        .conversation-item {
            padding: 16px;
            border-bottom: 1px solid #f3f4f6;
            cursor: pointer;
            transition: all 0.2s;
        }

        .conversation-item:hover {
            background: #f9fafb;
        }

        .conversation-item.active {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
        }

        .conversation-item.unread {
            background: #fefce8;
            font-weight: 600;
        }

        .conversation-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .conversation-name {
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
        }

        .conversation-time {
            font-size: 11px;
            color: #6b7280;
        }

        .conversation-tracking {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .conversation-preview {
            font-size: 13px;
            color: #6b7280;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .messages-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            border: 1px solid #e5e7eb;
        }

        .messages-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            background: #f9fafb;
            border-radius: 12px 12px 0 0;
        }

        .messages-header h2 {
            margin: 0 0 8px 0;
            font-size: 18px;
            color: #1f2937;
        }

        .messages-subheader {
            font-size: 13px;
            color: #6b7280;
        }

        .messages-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }

        .message-item {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        .message-item.admin {
            align-items: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message-item.admin .message-content {
            background: #3b82f6;
            color: white;
            border-radius: 12px 12px 4px 12px;
        }

        .message-item.user .message-content {
            background: white;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            border-radius: 12px 12px 12px 4px;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            font-size: 11px;
            color: #6b7280;
        }

        .message-sender {
            font-weight: 600;
        }

        .messages-footer {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            background: white;
            border-radius: 0 0 12px 12px;
        }

        .reply-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .reply-textarea {
            width: 100%;
            min-height: 80px;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
        }

        .reply-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .btn-reply {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reply:hover {
            background: #2563eb;
        }

        .btn-attach {
            padding: 10px 20px;
            background: #6b7280;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-attach:hover {
            background: #4b5563;
        }

        .attachments-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .attachment-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 12px;
            color: #374151;
        }

        .attachment-chip .remove {
            cursor: pointer;
            color: #ef4444;
            font-weight: bold;
        }

        .message-attachments {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        .attachment-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            text-decoration: none;
            color: inherit;
            font-size: 12px;
            margin-right: 8px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .attachment-link:hover {
            background: rgba(255,255,255,0.3);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #9ca3af;
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .inbox-header {
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .inbox-header h1 {
            margin: 0;
            font-size: 24px;
            color: #1f2937;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #2563eb;
        }

        .unread-badge {
            background: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 8px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile Responsive */
        @media (max-width: 968px) {
            .inbox-container {
                grid-template-columns: 1fr;
                height: auto;
                min-height: calc(100vh - 160px);
            }

            .conversations-list {
                height: 400px;
                order: 2;
            }

            .messages-panel {
                order: 1;
                min-height: 500px;
            }

            .conversation-item {
                padding: 12px;
            }
        }

        @media (max-width: 640px) {
            .inbox-container {
                margin: 20px auto;
                padding: 0 10px;
            }

            .page-header {
                padding: 20px 10px;
            }

            .page-header h1 {
                font-size: 1.5rem;
            }

            .conversations-list {
                height: 300px;
            }

            .messages-header h2 {
                font-size: 1.2rem;
            }

            .messages-subheader {
                font-size: 0.8rem;
            }

            .message-item {
                padding: 12px;
            }

            .reply-textarea {
                min-height: 80px;
            }

            .reply-actions {
                flex-direction: column;
                gap: 8px;
            }

            .btn-reply,
            .btn-attach {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div style="max-width: 1400px; margin: 0 auto; padding: 20px;">
        <div class="inbox-header">
            <h1>📧 Inbox</h1>
            <a href="admin.html" class="back-link">
                ← Back to Admin Panel
            </a>
        </div>

        <div class="inbox-container">
            <!-- Conversations List -->
            <div class="conversations-list" id="conversationsList">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading conversations...
                </div>
            </div>

            <!-- Messages Panel -->
            <div class="messages-panel">
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <h3>Select a conversation</h3>
                    <p>Choose a conversation from the left to view messages</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let conversations = [];
        let currentConversation = null;

        // Load conversations on page load
        async function loadConversations() {
            try {
                const response = await fetch('/api/conversations');
                const data = await response.json();
                conversations = data;
                renderConversations();
            } catch (error) {
                console.error('Error loading conversations:', error);
                document.getElementById('conversationsList').innerHTML = `
                    <div style="padding: 20px; text-align: center; color: #ef4444;">
                        Error loading conversations
                    </div>
                `;
            }
        }

        // Render conversations list
        function renderConversations() {
            const container = document.getElementById('conversationsList');
            
            if (conversations.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding: 40px;">
                        <div style="font-size: 48px; margin-bottom: 16px;">📭</div>
                        <h3 style="margin: 0 0 8px 0; color: #6b7280;">No messages yet</h3>
                        <p style="margin: 0; font-size: 13px; color: #9ca3af;">Customer replies will appear here</p>
                    </div>
                `;
                return;
            }

            // Group conversations by tracking number
            const groupedConversations = conversations.reduce((acc, msg) => {
                if (!acc[msg.tracking_number]) {
                    acc[msg.tracking_number] = {
                        tracking_number: msg.tracking_number,
                        shipment_id: msg.shipment_id,
                        latest_message: msg,
                        unread_count: 0,
                        messages: []
                    };
                }
                acc[msg.tracking_number].messages.push(msg);
                if (!msg.is_read && msg.sender_type !== 'admin') {
                    acc[msg.tracking_number].unread_count++;
                }
                // Update latest message if newer
                if (new Date(msg.created_at) > new Date(acc[msg.tracking_number].latest_message.created_at)) {
                    acc[msg.tracking_number].latest_message = msg;
                }
                return acc;
            }, {});

            const conversationGroups = Object.values(groupedConversations)
                .sort((a, b) => new Date(b.latest_message.created_at) - new Date(a.latest_message.created_at));

            container.innerHTML = conversationGroups.map(group => {
                const msg = group.latest_message;
                const isUnread = group.unread_count > 0;
                const isActive = currentConversation?.tracking_number === group.tracking_number;
                
                return `
                    <div class="conversation-item ${isUnread ? 'unread' : ''} ${isActive ? 'active' : ''}" 
                         onclick="loadConversation('${group.tracking_number}')">
                        <div class="conversation-header">
                            <span class="conversation-name">
                                ${msg.sender_name}
                                ${isUnread ? `<span class="unread-badge">${group.unread_count}</span>` : ''}
                            </span>
                            <span class="conversation-time">${formatTime(msg.created_at)}</span>
                        </div>
                        <div class="conversation-tracking">📦 ${msg.tracking_number}</div>
                        <div class="conversation-preview">${msg.message}</div>
                    </div>
                `;
            }).join('');
        }

        // Load specific conversation
        async function loadConversation(trackingNumber) {
            try {
                const response = await fetch(`/api/conversations/${trackingNumber}`);
                const messages = await response.json();
                currentConversation = { tracking_number: trackingNumber, messages };
                renderMessages();

                // Mark as read
                await fetch(`/api/conversations/${trackingNumber}/read`, { method: 'POST' });
                await loadConversations(); // Refresh list
            } catch (error) {
                console.error('Error loading conversation:', error);
            }
        }

        // Render messages
        function renderMessages() {
            const messagesPanel = document.querySelector('.messages-panel');
            const messages = currentConversation.messages;
            
            messagesPanel.innerHTML = `
                <div class="messages-header">
                    <h2>Conversation: ${messages[0]?.sender_name || 'Unknown'}</h2>
                    <div class="messages-subheader">📦 Tracking: ${currentConversation.tracking_number}</div>
                </div>
                <div class="messages-body" id="messagesBody">
                    ${messages.map(msg => `
                        <div class="message-item ${msg.sender_type === 'admin' ? 'admin' : 'user'}">
                            <div class="message-content">${msg.message}</div>
                            ${msg.attachments && msg.attachments.length > 0 ? `
                                <div class="message-attachments">
                                    ${msg.attachments.map(att => `
                                        <a href="/api/attachments/${att.path}" 
                                           class="attachment-link" 
                                           download="${att.filename}"
                                           target="_blank">
                                            📎 ${att.filename} (${formatFileSize(att.size)})
                                        </a>
                                    `).join('')}
                                </div>
                            ` : ''}
                            <div class="message-meta">
                                <span class="message-sender">${msg.sender_name}</span>
                                <span>•</span>
                                <span>${formatDateTime(msg.created_at)}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="messages-footer">
                    <form class="reply-form" onsubmit="sendReply(event)" id="replyForm">
                        <textarea 
                            class="reply-textarea" 
                            placeholder="Type your reply..."
                            id="replyText"
                            required
                        ></textarea>
                        <div class="attachments-preview" id="attachmentsPreview"></div>
                        <div class="reply-actions">
                            <input type="file" id="fileInput" multiple style="display: none;" onchange="handleFileSelect(event)">
                            <button type="button" class="btn-attach" onclick="document.getElementById('fileInput').click()">📎 Attach Files</button>
                            <button type="submit" class="btn-reply">Send Reply</button>
                        </div>
                    </form>
                </div>
            `;

            // Scroll to bottom
            const messagesBody = document.getElementById('messagesBody');
            messagesBody.scrollTop = messagesBody.scrollHeight;
        }

        // File selection state
        let selectedFiles = [];

        // Handle file selection
        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            selectedFiles = [...selectedFiles, ...files];
            updateAttachmentsPreview();
        }

        // Remove file from selection
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateAttachmentsPreview();
        }

        // Update attachments preview
        function updateAttachmentsPreview() {
            const preview = document.getElementById('attachmentsPreview');
            if (selectedFiles.length === 0) {
                preview.innerHTML = '';
                return;
            }

            preview.innerHTML = selectedFiles.map((file, index) => `
                <div class="attachment-chip">
                    📎 ${file.name} (${formatFileSize(file.size)})
                    <span class="remove" onclick="removeFile(${index})">×</span>
                </div>
            `).join('');
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // Send reply with attachments
        async function sendReply(event) {
            event.preventDefault();
            const replyText = document.getElementById('replyText').value.trim();
            
            if (!replyText) return;

            try {
                const formData = new FormData();
                formData.append('tracking_number', currentConversation.tracking_number);
                formData.append('message', replyText);
                
                // Add attachments
                selectedFiles.forEach(file => {
                    formData.append('attachments', file);
                });

                const response = await fetch('/api/conversations/reply', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    document.getElementById('replyText').value = '';
                    document.getElementById('fileInput').value = '';
                    selectedFiles = [];
                    updateAttachmentsPreview();
                    await loadConversation(currentConversation.tracking_number);
                } else {
                    alert('Failed to send reply');
                }
            } catch (error) {
                console.error('Error sending reply:', error);
                alert('Error sending reply');
            }
        }

        // Format time (e.g., "2 hours ago")
        function formatTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) return `${days}d ago`;
            if (hours > 0) return `${hours}h ago`;
            if (minutes > 0) return `${minutes}m ago`;
            return 'Just now';
        }

        // Format full date time
        function formatDateTime(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Check authentication
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/check');
                const data = await response.json();
                
                if (!data.authenticated) {
                    window.location.href = '/login.html';
                    return false;
                }
                return true;
            } catch (error) {
                console.error('Auth check failed:', error);
                window.location.href = '/login.html';
                return false;
            }
        }

        // Initialize
        (async () => {
            const isAuthenticated = await checkAuth();
            if (!isAuthenticated) return;
            
            loadConversations();
            
            // Refresh every 30 seconds
            setInterval(loadConversations, 30000);
        })();
    </script>
</body>
</html>
